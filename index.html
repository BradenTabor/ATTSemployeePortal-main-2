<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <!--
      Viewport locked to prevent iOS auto-zoom on input focus.
      Accessibility: App uses large touch targets (44px+) and text-base (16px) minimum
      for all interactive elements. See docs/ACCESSIBILITY.md for rationale.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#166534" />
    <meta name="description" content="All Terrain Tree Service Employee Portal" />
    <!-- Google Fonts: Outfit (UI) + JetBrains Mono (tabular data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Supabase preconnect: injected at build from VITE_SUPABASE_URL (project-specific origin) -->
    
    <!-- iOS PWA Meta Tags (REQUIRED FOR PUSH NOTIFICATIONS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ATTS Portal" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <title>ATTS Employee Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
