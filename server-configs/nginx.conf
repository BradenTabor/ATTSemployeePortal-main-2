# Nginx Configuration for ATTS Employee Portal
# Include this in your server block or as a separate conf.d file
#
# Usage:
#   include /path/to/atts-headers.conf;
#
# Or copy the relevant sections into your existing nginx.conf

# Enable Brotli compression (requires ngx_brotli module)
# If not available, gzip is used as fallback
brotli on;
brotli_comp_level 6;
brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

# Gzip fallback
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

server {
    listen 80;
    server_name your-domain.com;
    root /var/www/atts-portal/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Immutable assets with hashed filenames (1 year cache)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        # Enable pre-compressed files if available
        gzip_static on;
        brotli_static on;
    }

    # All images (including optimized WebP/AVIF)
    location ~* \.(png|jpg|jpeg|gif|ico|webp|avif|svg)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # JavaScript and CSS files
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
        brotli_static on;
    }

    # Fonts
    location ~* \.(woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # PWA manifest - shorter cache for updates
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
    }

    # Service worker - no cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # HTML and SPA routing fallback
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}

